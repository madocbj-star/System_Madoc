{% extends 'base_dashboard.html' %}

{% block title %}
Nuevo Producto | Madoc System
{% endblock %}

{% block content %}

<div class="container-fluid">

    <!-- TITULO -->

    <div class="mb-4">

        <h2 class="fw-bold">
            Registrar Producto
        </h2>

        <p class="text-secondary">
            Gestión de inventario y repuestos
        </p>

    </div>

    <!-- FORMULARIO -->

    <div class="card shadow">

        <div class="card-body p-4">

            <form method="POST"
                enctype="multipart/form-data">

                <div class="row">

                    <!-- NOMBRE -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Nombre Producto
                        </label>

                        <input type="text"
                            name="nombre"
                            class="form-control"
                            required>

                    </div>

                    <!-- CATEGORIA -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Categoría
                        </label>

                        <select name="categoria_id"
                            class="form-select"
                            required>

                            <option value="">
                                Seleccione categoría
                            </option>

                            {% for categoria in categorias %}

                            <option value="{{ categoria.id }}">

                                {{ categoria.nombre }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- MARCA -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Marca
                        </label>

                        <input type="text"
                            name="marca"
                            class="form-control">

                    </div>

                    <!-- CODIGO -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Código Producto
                        </label>

                        <input type="text"
                            class="form-control"
                            value="Generado automáticamente"
                            readonly>

                    </div>

                    <!-- STOCK -->

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Stock
                        </label>

                        <input type="number"
                            name="stock"
                            class="form-control"
                            value="0">

                    </div>

                    <!-- STOCK MINIMO -->

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Stock Mínimo
                        </label>

                        <input type="number"
                            name="stock_minimo"
                            class="form-control"
                            value="1">

                    </div>

                    <!-- PRECIO COMPRA -->

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Precio Compra
                        </label>

                        <input type="number"
                            step="0.01"
                            name="precio_compra"
                            class="form-control"
                            value="0">

                    </div>

                    <!-- PRECIO VENTA -->

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Precio Venta
                        </label>

                        <input type="number"
                            step="0.01"
                            name="precio_venta"
                            class="form-control"
                            value="0">

                    </div>

                    <!-- FOTO -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Foto Producto
                        </label>

                        <input type="file"
                            name="foto"
                            class="form-control"
                            accept="image/*">

                    </div>

                    <!-- DESCRIPCION -->

                    <div class="col-12 mb-4">

                        <label class="form-label">
                            Descripción
                        </label>

                        <textarea name="descripcion"
                            class="form-control"
                            rows="4"></textarea>

                    </div>

                </div>

                <!-- BOTONES -->

                <div class="d-flex gap-2">

                    <button type="submit"
                        class="btn btn-info">

                        Registrar Producto

                    </button>

                    <a href="/inventario"
                        class="btn btn-secondary">

                        Cancelar

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
