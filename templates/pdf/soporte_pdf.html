<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Soporte Fotográfico PDF</title>

    <style>
        {{ pdf_css | safe }}

        .soporte-header {
            text-align: center;
            padding: 14px 0 18px;
            border-bottom: 2px solid #1e3a5f;
            margin-bottom: 18px;
        }
        .soporte-header img {
            width: 70px;
            margin-bottom: 8px;
        }
        .soporte-header h1 {
            font-size: 16px;
            color: #1e3a5f;
            margin: 4px 0 2px;
        }
        .soporte-header p {
            font-size: 11px;
            color: #555;
            margin: 0;
        }
        .foto-bloque {
            margin-bottom: 22px;
            page-break-inside: avoid;
        }
        .foto-bloque .etiqueta {
            display: inline-block;
            background: #1e3a5f;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .foto-bloque img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }
        .foto-bloque .desc {
            font-size: 11px;
            color: #333;
            margin-top: 6px;
        }
    </style>

</head>

<body>

    <div class="soporte-header">
        <img src="{{ logo_url }}">
        <h1>SOPORTE FOTOGRÁFICO</h1>
        <p>Orden de servicio: {{ orden.codigo_orden }}</p>
    </div>

    {% for foto in fotos %}
    <div class="foto-bloque">
        {% if foto.desc %}
        <div class="etiqueta">{{ foto.desc }}</div>
        {% endif %}
        <img src="{{ foto.url }}">
    </div>
    {% endfor %}

    <div class="footer">
        Documento generado el {{ fecha_generacion }}
    </div>

</body>
</html>
